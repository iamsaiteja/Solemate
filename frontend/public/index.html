<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon-32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0e" />

    <!-- Primary SEO -->
    <title>SoleMate — Premium Sneakers Online | Nike, Adidas, Puma & More</title>
    <meta
      name="description"
      content="SoleMate is India's cinematic sneaker store. Shop premium kicks from Nike, Adidas, Puma, Jordan and more in an immersive 3D experience — UPI, cards & COD, free shipping, easy returns."
    />
    <meta
      name="keywords"
      content="SoleMate, sneakers online India, buy shoes online, premium sneakers, Nike shoes, Adidas shoes, Jordan, running shoes, sneaker store, solemate sneakers"
    />
    <meta name="author" content="SoleMate" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ecommerce-django-two.vercel.app/" />

    <!-- Open Graph (WhatsApp / Facebook / LinkedIn link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SoleMate" />
    <meta property="og:title" content="SoleMate — Premium Sneakers Online" />
    <meta
      property="og:description"
      content="Step into the future. Shop premium sneakers in an immersive 3D experience — UPI, cards & COD."
    />
    <meta property="og:url" content="https://ecommerce-django-two.vercel.app/" />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SoleMate — Premium Sneakers Online" />
    <meta
      name="twitter:description"
      content="India's cinematic sneaker store. Premium kicks, immersive 3D shopping, UPI & COD."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/logo512.png" />

    <!-- Structured data so search engines understand the brand -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "SoleMate",
        "alternateName": "SoleMate Sneakers",
        "url": "https://ecommerce-django-two.vercel.app/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://ecommerce-django-two.vercel.app/products?category={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "OnlineStore",
        "name": "SoleMate",
        "description": "Premium sneaker store with an immersive 3D shopping experience.",
        "url": "https://ecommerce-django-two.vercel.app/",
        "logo": "https://ecommerce-django-two.vercel.app/logo512.png",
        "paymentAccepted": "UPI, Credit Card, Debit Card, Cash on Delivery",
        "currenciesAccepted": "INR"
      }
    </script>

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
